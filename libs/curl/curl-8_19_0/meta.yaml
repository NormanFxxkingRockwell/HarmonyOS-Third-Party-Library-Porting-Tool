name: curl
version: curl-8_19_0

source:
  upstream: https://github.com/curl/curl
  archive: https://github.com/curl/curl/archive/refs/tags/curl-8_19_0.zip
  porting_repo: ../ho-thirdparty-porting
  output_bundle: outputs/curl

recipe:
  method: lycium
  scope: community
  source_path: tpc_c_cplusplus/community/curl_8_19_0
  build_system: cmake
  package_name: curl-8_19_0.zip
  builddir: curl-curl-8_19_0

archs:
  - arm64-v8a

dependencies:
  build:
    - openssl
    - zstd
    - nghttp2
  runtime:
    - openssl (libssl.so.3, libcrypto.so.3)
    - zstd (libzstd.so.1)
    - nghttp2 (libnghttp2.so.14)
    - zlib (libz.so)

artifacts:
  verified_bundle: artifacts/arm64-v8a
  per_arch_install:
    arm64-v8a: artifacts/arm64-v8a
  binaries:
    - bin/curl
    - bin/curl-config
    - bin/wcurl
  libraries:
    - lib/libcurl.so.4.8.0
  headers:
    - include/curl/
  cmake_config:
    - lib/cmake/CURL/
  pkgconfig:
    - lib/pkgconfig/libcurl.pc
  bundled_runtime:
    dir: lib/runtime-deps/
    files:
      - libcrypto.so.3
      - libssl.so.3
      - libzstd.so
      - libzstd.so.1
      - libzstd.so.1.5.7
      - libnghttp2.so
      - libnghttp2.so.14
      - libnghttp2.so.14.29.3
      - libz.so
      - libz.so.1
      - libz.so.1.3.2
  notes:
    config_files_have_host_paths: "bin/curl-config, lib/pkgconfig/libcurl.pc, lib/cmake/CURL/CURLConfig.cmake 含本机绝对路径，不可直接跨机器复用"

validation:
  build_pass: pass
  binary_pass: pass
  device_pass: pass
  device_channel: hdc fallback
  device_entry: cli
  device_push_dir: /data/local/tmp/curl/
  device_commands:
    - "LD_LIBRARY_PATH=/data/local/tmp/curl ./curl --version"
    - "LD_LIBRARY_PATH=/data/local/tmp/curl ./curl -I https://www.baidu.com"
  device_key_output: "curl 8.19.0-DEV (aarch64-linux-ohos) libcurl/8.19.0-DEV OpenSSL/3.6.1 zlib/1.3.1 zstd/1.5.7 nghttp2/1.68.1"
  http_test: "HTTP/1.1 200 OK"

docs:
  adaptation_plan: docs/adaptation-plan.md
  adaptation_report: docs/adaptation-report.md
  build_report: docs/build-report.md
  dependency_fixes:
    nghttp2: docs/dependencies/nghttp2-ENABLE_EXAMPLES-fix.md
