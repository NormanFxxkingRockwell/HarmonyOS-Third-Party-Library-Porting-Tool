name: bzip2
version: 1_0_6

source:
  upstream: https://sourceware.org/bzip2/
  archive: https://sourceware.org/pub/bzip2/bzip2-1.0.8.tar.gz
  porting_repo: ../ho-thirdparty-porting
  output_bundle: outputs/bzip2

recipe:
  method: fallback
  scope: thirdparty
  source_path: tpc_c_cplusplus/thirdparty/bzip2
  build_system: makefile
  package_name: bzip2-bzip2-1_0_6.zip
  builddir: bzip2-bzip2-1_0_6
  fallback_script: recipe/build.sh
  fallback_script_usage: "SOURCE_DIR=<bzip2-src> OUTPUT_ROOT=<output> bash recipe/build.sh"

archs:
  - arm64-v8a

artifacts:
  verified_bundle: artifacts/arm64-v8a
  per_arch_install:
    arm64-v8a: artifacts/arm64-v8a
  shared_libs:
    - lib/libbz2.so.1.0.8
    - lib/libbz2.so.1.0
  test_binaries:
    - bin/bzip2-shared
  headers:
    - include/bzlib.h

validation:
  build_pass: pass
  binary_pass: pass
  device_pass: pass
  device_channel: hdc fallback
  device_entry: bzip2-shared --help 及解压 sample1.bz2
  validation_inputs:
    - docs/validation/sample1.bz2

dependencies:
  runtime: []
  build:
    - make
    - clang (from OHOS_SDK)

docs:
  adaptation_plan: docs/adaptation-plan.md
  adaptation_report: docs/adaptation-report.md
  build_report: docs/build-report.md
