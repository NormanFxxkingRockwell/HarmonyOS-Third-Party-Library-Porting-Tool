name: zlib
version: 1.3.2

source:
  upstream: https://zlib.net/
  archive: https://zlib.net/fossils/zlib-1.3.2.tar.gz
  porting_repo: ../ho-thirdparty-porting
  output_bundle: outputs/zlib

recipe:
  method: lycium
  scope: thirdparty
  source_path: tpc_c_cplusplus/thirdparty/zlib
  build_system: cmake
  package_name: zlib-1.3.2.tar.gz
  builddir: zlib-1.3.2

archs:
  - arm64-v8a

dependencies:
  bundled_runtime:
    - libc++_shared.so

artifacts:
  verified_bundle: artifacts/arm64-v8a
  per_arch_install:
    arm64-v8a: artifacts/arm64-v8a
  includes_headers: true
  includes_test_binaries: true

validation:
  build_pass: pass
  binary_pass: pass
  device_pass: pass
  device_channel: hdc fallback
  device_entry: zlib_example
  device_scenario: run upstream zlib example to exercise compression and decompression

docs:
  adaptation_plan: docs/adaptation-plan.md
  adaptation_report: docs/adaptation-report.md
  build_report: docs/build-report.md
